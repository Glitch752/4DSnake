<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png">
    <title>4D Snake</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #101010;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            z-index: 1000;
        }

        #boards {
            position: relative;

            /* Reflected in layout.js; i'm too lazy to change from code */
            top: 70px;
            left: 20px;
        }

        .board-snapshot {
            position: absolute;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            transition: translate 0.3s ease;
        }
        .board-canvas {
            transform: none;
        }
        .board-header {
            position: absolute;
            top: -30px;
            left: 0;
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="boards"></div>
    <canvas id="gameCanvas"></canvas>

    <script type="module" src="game.js"></script>
</body>
</html>
